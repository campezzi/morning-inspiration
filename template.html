<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Inspiration — {{TITLE}}</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="dispatch">

    <div class="format-label">{{FORMAT}}</div>

    {{MEDIA_BLOCK}}

    <div class="work-info">
      <div class="work-title">{{TITLE}}</div>
      <div class="work-creator">{{CREATOR}}, {{YEAR}}</div>
    </div>

    <div class="note">
      {{NOTE}}
    </div>

    <footer class="dispatch-footer">
      <div class="source-line">{{SOURCE}}</div>
      <div class="date-line">{{DATE}}</div>
      <div class="footer-links">
        {{YESTERDAY_LINK}}
        <a class="archive-link" href="archive.html">archive</a>
      </div>
    </footer>

  </main>
</body>
</html>
