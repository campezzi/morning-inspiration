name: Smoke · Permissions

# Minimal workflow that exercises the same git + PR + merge path as the
# real Morning Dispatch run, without invoking Claude. Use this to verify
# repo/account settings allow workflows to push, open PRs, and merge to
# main — finishes in under 30 seconds, no API cost.
#
# Run from the Actions tab → Smoke · Permissions → Run workflow.

on:
  workflow_dispatch: {}

permissions: write-all  # smoke test only — grants everything to rule out a scope issue

concurrency:
  group: smoke-permissions
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Australia/Sydney
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name "morning-dispatch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make a trivial change on a new branch
        id: branch
        run: |
          set -euo pipefail
          BRANCH="smoke/$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          mkdir -p .smoke-test
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) run=${{ github.run_id }}" >> .smoke-test/runs.log
          git add .smoke-test/runs.log
          git commit -m "smoke: log run ${{ github.run_id }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Inspect token identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "--- gh auth status ---"
          gh auth status || true
          echo "--- whoami (as token) ---"
          gh api user --jq '. | {login, type, id}' || true
          echo "--- repo perms the token sees ---"
          gh api "repos/${GITHUB_REPOSITORY}" --jq '.permissions' || true

      - name: Push, open PR, merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.branch.outputs.name }}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin HEAD
          echo "--- trying REST API directly (clearer error than gh) ---"
          gh api "repos/${GITHUB_REPOSITORY}/pulls" -X POST \
            -f title="smoke: permissions verification" \
            -f head="$BRANCH" \
            -f base="main" \
            -f body="Dummy run." \
            && PR_OPENED=1 || PR_OPENED=0
          if [ "$PR_OPENED" = "1" ]; then
            gh pr merge "$BRANCH" --squash --delete-branch
          else
            echo "PR creation failed even with write-all; see error above."
            exit 1
          fi
