name: Smoke · Permissions

# Minimal workflow that exercises the same git + PR + merge path as the
# real Morning Dispatch run, without invoking Claude. Use this to verify
# the runner can push, open PRs, and merge to main — finishes in under
# 30 seconds, no API cost.
#
# Authenticates via the WORKFLOW_PAT secret (fine-grained PAT scoped to
# this repo with Contents + Pull requests write). The default GITHUB_TOKEN
# could not create PRs even with all permissions granted; PAT sidesteps
# whatever was gating it.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: smoke-permissions
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Australia/Sydney
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Configure git author
        run: |
          git config user.name "morning-dispatch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make a trivial change on a new branch
        id: branch
        run: |
          set -euo pipefail
          BRANCH="smoke/$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          mkdir -p .smoke-test
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) run=${{ github.run_id }}" >> .smoke-test/runs.log
          git add .smoke-test/runs.log
          git commit -m "smoke: log run ${{ github.run_id }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Verify PAT identity
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          echo "Token length: ${#GH_TOKEN}"
          echo "Token prefix: ${GH_TOKEN:0:7}…  (github_pat_ = fine-grained, ghp_ = classic)"
          echo "--- gh auth status ---"
          gh auth status || true
          echo "--- whoami (should print campezzi if PAT is healthy) ---"
          gh api user --jq '{login, type, id}' || true
          echo "--- can the PAT see the repo and its perms? ---"
          gh api "repos/${GITHUB_REPOSITORY}" --jq '{full_name, private, fork, permissions, default_branch}' || true
          echo "--- actual OAuth scopes on this token (classic PAT only) ---"
          curl -sI -H "Authorization: token ${GH_TOKEN}" https://api.github.com/user \
            | grep -iE '^x-(oauth|accepted-oauth)-scopes:' || echo "(no oauth-scopes header — likely a fine-grained PAT)"

      - name: Push, open PR, merge
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.branch.outputs.name }}"
          git push -u origin HEAD
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "smoke: permissions verification" \
            --body "Dummy run from .github/workflows/smoke-permissions.yml."
          gh pr merge "$BRANCH" --squash --delete-branch
