name: Morning Dispatch

# Runs the daily generator from GENERATOR_PROMPT.md.
# Cron is UTC. 19:00 UTC = 05:00 AEST (Sydney winter / UTC+10).
# When AEDT (daylight saving, UTC+11) kicks in, change to 18:00 UTC.
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: morning-dispatch
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Align the runner's clock with the curator's local time so `date`,
      # the agent, and the post-step all agree on what "today" means.
      # Without this, a cron firing at 19:00 UTC is "still yesterday" to
      # processes on the runner, and Step 2's idempotency check trips.
      TZ: Australia/Sydney
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name "morning-dispatch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create dispatch branch
        id: branch
        run: |
          BRANCH="dispatch/$(date -u +%Y-%m-%d)-${{ github.run_number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read `GENERATOR_PROMPT.md` and execute it end-to-end. `EDITORIAL.md` is the source of truth for what to feature and how the note should read.
          claude_args: |
            --max-turns 60
            --allowedTools Read,Write,Edit,Bash,WebFetch,WebSearch

      - name: Commit, push, open PR, merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.branch.outputs.name }}"
          git add -A
          if git diff --cached --quiet; then
            echo "Working tree clean — idempotent exit (Step 2 short-circuit)."
            exit 0
          fi
          TITLE=$(jq -r '.[-1].title' history.json)
          CREATOR=$(jq -r '.[-1].creator' history.json)
          MSG="add entry: ${TITLE} — ${CREATOR}"
          git commit -m "$MSG"
          git push -u origin HEAD
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$MSG" \
            --body "Automated entry from the morning-dispatch workflow."
          gh pr merge "$BRANCH" \
            --squash \
            --delete-branch \
            --subject "$MSG"
